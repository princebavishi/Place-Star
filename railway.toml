# PlaceStar Monorepo — Railway Deployment Guide
#
# This repo has TWO Railway services, each with its own railway.toml:
#   Backend/railway.toml  — Node.js API
#   Frontend/railway.toml — React (nginx)
#
# DO NOT configure builder here. Railway will find the correct
# railway.toml once you set the Root Directory per service in the UI.
#
# Steps:
#  1. Create a Railway project
#  2. Add service 1 → GitHub repo → Root Directory: "Backend"
#  3. Add service 2 → GitHub repo → Root Directory: "Frontend"
#  4. Add a Volume to the Backend service, mount at /data
#  5. Set env vars on Backend service (see Backend/.env.example)
